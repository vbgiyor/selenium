# Maven Package - Selenium Automation
# Publishes to GitLab Package Registry on tag creation (replaces GitHub Packages publish)
# Trigger: create a git tag (e.g. v1.0.0) to kick off a release

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'   # only runs on tag push — mirrors GitHub's "on: release: created"

stages:
  - build
  - publish

build:
  stage: build
  image: maven:3.8-eclipse-temurin-11

  variables:
    MAVEN_REPO: "$CI_PROJECT_DIR/.m2/repository"

  cache:
    key: maven-seleniumautomation
    paths:
      - .m2/repository

  script:
    - mvn -B package --file pom.xml -Dmaven.repo.local=$MAVEN_REPO

  artifacts:
    expire_in: 1 hour
    paths:
      - target/*.jar

publish:
  stage: publish
  image: maven:3.8-eclipse-temurin-11
  needs: [build]

  variables:
    MAVEN_REPO: "$CI_PROJECT_DIR/.m2/repository"

  cache:
    key: maven-seleniumautomation
    paths:
      - .m2/repository

  script:
    - |
      mvn deploy \
        -Dmaven.repo.local=$MAVEN_REPO \
        -DaltDeploymentRepository=gitlab::default::${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/maven \
        --file pom.xml \
        -s ci_settings.xml
  before_script:
    - |
      cat << EOF > ci_settings.xml
      <settings>
        <servers>
          <server>
            <id>gitlab</id>
            <configuration>
              <httpHeaders>
                <property>
                  <name>Job-Token</name>
                  <value>\${CI_JOB_TOKEN}</value>
                </property>
              </httpHeaders>
            </configuration>
          </server>
        </servers>
      </settings>
      EOF
